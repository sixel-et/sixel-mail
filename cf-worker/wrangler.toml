name = "sixel-mail-inbound"
main = "src/worker.js"
compatibility_date = "2024-09-23"
account_id = "16ba5057d0d3002e9b9531b40f79853e"

[vars]
WEBHOOK_URL = "https://sixel.email/webhooks/inbound"

# KV namespace for agent→contact mappings
# Create with: wrangler kv:namespace create "AGENTS"
# Then paste the id here
[[kv_namespaces]]
binding = "AGENTS"
id = "e53c1e7905054c0a80bc2a7251410587"

# Secrets (set with: wrangler secret put WORKER_AUTH_SECRET)
# WORKER_AUTH_SECRET - shared secret for authenticating with our webhook
